<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Success
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
   <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Noto Sans KR', sans-serif;
            background-color:#f4f0ea;
            min-height:100vh;

            display:flex;
            flex-direction:column;
        }

       header{
            width: 100%;
            background-color: #1b120c;
            border-bottom: 1px solid #5b3b1f;
        }

        .navbar{
            width: 90%;
            margin: auto;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 18px 0;
        }

        .logo{
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img{
            width: 45px;
            height: 45px;
        }

        .logo h1{
            color: #d6a24a;
            font-size: 38px;
            font-family: 'Cinzel', serif;
        }

        .menu a{
            color: white;
            text-decoration: none;
            margin-left: 35px;
            font-size: 18px;
            transition: 0.3s;
        }

        .menu a:hover{
            color: #d6a24a;
        }

        .reservation{
    width:700px;
    margin:50px auto;

    background:white;

    padding:50px;

    border-radius:15px;

    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

        .reservation h2{
            text-align:center;
            color:#5a2d17;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:12px;

            border:1px solid #ccc;
            border-radius:5px;

            font-size:16px;
        }

        textarea{
            resize:none;
            height:100px;
        }

        button{
            width:100%;
            padding:15px;

            background:#5a2d17;
            color:white;

            border:none;
            border-radius:5px;

            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#d6a24a;
        }

        footer{
            background:#1b120c;
            color:white;

            padding:30px;
            margin-top:auto;

            text-align:center;
        }

        .check{
    width:100px;
    height:100px;

    margin:0 auto 20px;

    background:#d6a24a;
    color:white;

    border-radius:50%;

    font-size:60px;
    font-weight:bold;

    text-align:center;
    line-height:100px;
}

.message{
    text-align:center;
    color:#555;
    margin-bottom:10px;
}

.info-box{
    margin-top:25px;

    padding:20px;

    background:#f4f0ea;

    border-radius:10px;

    text-align:center;
}

.info-box h3{
    color:#5a2d17;
    margin-bottom:15px;
}

.info-box p{
    margin-bottom:8px;
}

.btn{
    display:block;

    width:250px;

    margin:30px auto 0;

    padding:15px;

    background:#5a2d17;
    color:white;

    text-decoration:none;
    text-align:center;

    border-radius:5px;

    transition:0.3s;
}

.btn:hover{
    background:#d6a24a;
}

    </style>

</head>

<body>

<header>

    <div class="navbar">

        <div class="logo">
            <img src="./img/main_logo.png" alt="logo">
            <h1>AsiaToEurope</h1>
        </div>

        <div class="menu">
            <a href="index.html">메인</a>
            <a href="korea.html">한국 음식</a>
            <a href="kyrgyzstan.html">키르기스스탄 음식</a>
            <a href="turkey.html">터키 음식</a>
            <a href="restaurant.html">레스토랑 및 위치</a>
            <a href="reservation.html">예약하기</a>
        </div>

    </div>

</header>

<section class="reservation">

    <div class="check">
        ✓
    </div>

    <h2>예약이 완료되었습니다!</h2>

    <p class="message">
        AsiaToEurope 레스토랑을 예약해 주셔서 감사합니다.
    </p>

    <p class="message">
        예약 정보는 곧 확인해 드리겠습니다.
    </p>

    <div class="info-box">

        <h3>예약 정보</h3>

        <p>예약 상태 : 확인 대기중</p>
        <p>전화번호 : 02-1234-5678</p>
        <p>영업시간 : 11:00 ~ 22:00</p>

    </div>

    <a href="./index.html" class="btn">
        메인으로 돌아가기
    </a>

</section>

<footer>

    <p>© 2026 AsiaToEurope</p>

</footer>

</body>
</html>
