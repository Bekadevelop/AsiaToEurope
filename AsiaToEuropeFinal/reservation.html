<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>예약하기</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
   <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Noto Sans KR', sans-serif;
            background-color:#f4f0ea;
            min-height:100vh;

            display:flex;
            flex-direction:column;
        }

       header{
            width: 100%;
            background-color: #1b120c;
            border-bottom: 1px solid #5b3b1f;
        }

        .navbar{
            width: 90%;
            margin: auto;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 18px 0;
        }

        .logo{
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img{
            width: 45px;
            height: 45px;
        }

        .logo h1{
            color: #d6a24a;
            font-size: 38px;
            font-family: 'Cinzel', serif;
        }

        .menu a{
            color: white;
            text-decoration: none;
            margin-left: 35px;
            font-size: 18px;
            transition: 0.3s;
        }

        .menu a:hover{
            color: #d6a24a;
        }

        .reservation{
            width:700px;
            margin:50px auto;

            background:white;
            padding:40px;

            border-radius:15px;

            box-shadow:0 0 10px rgba(0,0,0,0.15);
        }

        .reservation h2{
            text-align:center;
            color:#5a2d17;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:12px;

            border:1px solid #ccc;
            border-radius:5px;

            font-size:16px;
        }

        textarea{
            resize:none;
            height:100px;
        }

        button{
            width:100%;
            padding:15px;

            background:#5a2d17;
            color:white;

            border:none;
            border-radius:5px;

            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#d6a24a;
        }

        footer{
            background:#1b120c;
            color:white;

            padding:30px;
            margin-top:auto;

            text-align:center;
        }

    </style>

</head>

<body>

<header>

    <div class="navbar">

        <div class="logo">
            <img src="./img/main_logo.png" alt="logo">
            <h1>AsiaToEurope</h1>
        </div>

        <div class="menu">
            <a href="index.html">메인</a>
            <a href="korea.html">한국 음식</a>
            <a href="kyrgyzstan.html">키르기스스탄 음식</a>
            <a href="turkey.html">터키 음식</a>
            <a href="restaurant.html">레스토랑 및 위치</a>
            <a href="reservation.html">예약하기</a>
        </div>

    </div>

</header>

<section class="reservation">

    <h2>레스토랑 예약</h2>

    <form>

        <div class="form-group">
            <label>이름</label>
            <input type="text" placeholder="이름 입력">
        </div>

        <div class="form-group">
            <label>전화번호</label>
            <input type="tel" placeholder="010-1234-5678">
        </div>

        <div class="form-group">
            <label>예약 날짜</label>
            <input type="date">
        </div>

        <div class="form-group">
            <label>예약 시간</label>
            <input type="time">
        </div>

        <div class="form-group">
            <label>인원수</label>
            <select>
                <option>1명</option>
                <option>2명</option>
                <option>3명</option>
                <option>4명</option>
                <option>5명</option>
                <option>6명 이상</option>
            </select>
        </div>

        <div class="form-group">
            <label>요청사항</label>
            <textarea placeholder="특별 요청사항을 입력하세요"></textarea>
        </div>

        <button type="submit">
            예약하기
        </button>

    </form>

</section>

<footer>

    <p>© 2026 AsiaToEurope</p>

</footer>

</body>
</html>
